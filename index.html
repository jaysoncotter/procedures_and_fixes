<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Procedure Fix Lookup</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 950px;
            margin: 40px auto;
            padding: 20px;
            background: #f4f6f8;
        }

        h1 { margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 25px; }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background: #4CAF50;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover { background: #45a049; }

        .result {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-left: 5px solid #4CAF50;
        }

        .match-tag {
            background: #e3f2fd;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .fix-highlight {
            font-weight: bold;
            color: #d32f2f;
        }

        .error {
            color: red;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Procedure Fix Lookup</h1>
<div class="subtitle">Phonetic search for STAR/DP waypoints</div>

<label>Airport Identifier (Type or Select):</label>
<input type="text" id="airportInput" placeholder="e.g. DEN">

<select id="airportSelect">
    <option value="">Select airport...</option>
</select>

<label>Search Fix:</label>
<input type="text" id="fixInput" placeholder="e.g. FOAMM, FOAMY, CLASH">

<button onclick="search()">Search</button>

<div id="results"></div>

<script>

let airportsData = [];

/* -------------------------
   Simple Phonetic Cleaner
--------------------------*/
function phoneticKey(str) {
    return str
        .toUpperCase()
        .replace(/[AEIOU]/g, '')
        .replace(/(.)\1+/g, '\$1');
}

/* -------------------------
   Load JSON + Sort Airports
--------------------------*/
async function loadData() {
    try {
        const response = await fetch('procedures_and_fixes.json');
        const data = await response.json();

        airportsData = data.airports || data;

        // Normalize airport codes
        airportsData.forEach(a => {
            a.airport = a.airport.trim().toUpperCase();
        });

        // ✅ Alphabetical sort
        airportsData.sort((a, b) =>
            a.airport.localeCompare(b.airport)
        );

        populateDropdown();

    } catch (err) {
        document.getElementById("results").innerHTML =
            `<div class="error">Error loading JSON: ${err}</div>`;
    }
}

/* -------------------------
   Populate Dropdown
--------------------------*/
function populateDropdown() {
    const select = document.getElementById("airportSelect");
    select.innerHTML = `<option value="">Select airport...</option>`;

    airportsData.forEach(a => {
        const option = document.createElement("option");
        option.value = a.airport;
        option.textContent = a.airport;
        select.appendChild(option);
    });
}

/* -------------------------
   Sync Input + Dropdown
--------------------------*/
document.getElementById("airportSelect").addEventListener("change", e => {
    document.getElementById("airportInput").value = e.target.value;
});

document.getElementById("airportInput").addEventListener("input", e => {
    const val = e.target.value.toUpperCase();
    document.getElementById("airportSelect").value = val;
});

/* -------------------------
   Search Logic
--------------------------*/
function search() {

    const airportCode = document.getElementById("airportInput")
        .value.trim().toUpperCase();

    const fixSearch = document.getElementById("fixInput")
        .value.trim().toUpperCase();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if (!airportCode) {
        resultsDiv.innerHTML =
            `<div class="error">Enter an airport identifier.</div>`;
        return;
    }

    const airport = airportsData.find(a => a.airport === airportCode);

    if (!airport) {
        resultsDiv.innerHTML =
            `<div class="error">Airport not found.</div>`;
        return;
    }

    if (!fixSearch) {
        resultsDiv.innerHTML =
            `<div class="error">Enter a fix to search.</div>`;
        return;
    }

    const searchKey = phoneticKey(fixSearch);
    let matchFound = false;

    airport.procedures.forEach(proc => {

        proc.fixes.forEach(fix => {

            let matchType = null;

            if (fix === fixSearch) {
                matchType = "Exact";
            }
            else if (fix.includes(fixSearch)) {
                matchType = "Contains";
            }
            else if (phoneticKey(fix) === searchKey) {
                matchType = "Phonetic";
            }

            if (matchType) {
                matchFound = true;

                const fullRoute = proc.fixes.map(f =>
                    f === fix
                        ? `<span class="fix-highlight">${f}</span>`
                        : f
                ).join(" → ");

                resultsDiv.innerHTML += `
                    <div class="result">
                        <div>
                            <strong>${fix}</strong>
                            <span class="match-tag">${matchType}</span>
                        </div>
                        <div>
                            Procedure: ${proc.name} (${proc.id})
                        </div>
                        <div style="margin-top:8px;">
                            <strong>Full Procedure Route:</strong><br>
                            ${fullRoute}
                        </div>
                    </div>
                `;
            }
        });

    });

    if (!matchFound) {
        resultsDiv.innerHTML =
            `<div class="error">No matches found.</div>`;
    }
}

loadData();

</script>

</body>
</html>
